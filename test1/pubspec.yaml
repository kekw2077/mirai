name: alice_ai
description: Alice AI — local & remote AI chat client
publish_to: "none"
version: 1.6.0+10

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  speech_to_text: ^7.0.0
  uuid: ^4.5.1
  flutter_test:
    sdk: flutter
  file_picker: ^11.0.2
  image_picker: ^1.2.2
  fllama:
    git:
      url: https://github.com/Telosnex/fllama.git
      ref: 3b1351a957920bf2a0df3709cce1e3a7195c479e
  path_provider: ^2.1.6
  package_info_plus: ^8.1.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
  windows:
    generate: true
  web:
    generate: true

flutter_native_splash:
  background_image: "assets/splash/splash_light.png"
  background_image_dark: "assets/splash/splash_dark.png"
  fullscreen: true
  android: true
  ios: true
  web: true

  # Android 12+ enforces its own splash screen layout (a small icon on a
  # solid color background, no full-bleed artwork), so it gets its own
  # color-only config; it falls back to the app's launcher icon.
  android_12:
    color: "#ebf4fc"
    color_dark: "#0f182f"
    icon_background_color: "#ebf4fc"
    icon_background_color_dark: "#0f182f"
name: mirai
description: Mirai — local & remote AI chat client
publish_to: "none"
version: 2.11.1+36

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  speech_to_text: ^7.0.0
  uuid: ^4.5.1
  flutter_test:
    sdk: flutter
  file_picker: ^11.0.2
  photo_manager: ^3.9.0
  fllama:
    git:
      url: https://github.com/Telosnex/fllama.git
      ref: 3b1351a957920bf2a0df3709cce1e3a7195c479e
  path_provider: ^2.1.6
  package_info_plus: ^8.1.0
  open_filex: ^4.5.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  assets:
    - shorebird.yaml
  uses-material-design: true
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 800

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
  windows:
    generate: true
  web:
    generate: true

flutter_native_splash:
  color: "#ebf4fc"
  color_dark: "#0f182f"
  image: assets/splash/splash_orb.png
  image_dark: assets/splash/splash_orb.png
  # Must stay false: true makes the generator set UIStatusBarHidden=true in
  # ios/Runner/Info.plist, which hides the status bar (time/signal/battery)
  # app-wide on iOS, not just during the splash -- this has bitten the
  # project before. Re-running `flutter_native_splash:create` with this on
  # silently reintroduces the bug, so the flag itself has to stay off.
  fullscreen: false
  android: true
  ios: true
  web: true

  # Android 12+ enforces its own splash screen layout (a small icon on a
  # solid color background, no full-bleed artwork), so it gets its own
  # color-only config; it falls back to the app's launcher icon.
  android_12:
    color: "#ebf4fc"
    color_dark: "#0f182f"
    icon_background_color: "#ebf4fc"
    icon_background_color_dark: "#0f182f"
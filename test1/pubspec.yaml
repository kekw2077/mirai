name: alice_ai
description: Alice AI — local & remote AI chat client
publish_to: "none"
version: 1.1.0+2

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  speech_to_text: ^7.0.0
  uuid: ^4.5.1
  flutter_test:
    sdk: flutter
  file_picker: ^11.0.2
  image_picker: ^1.2.2
  fllama:
    git:
      url: https://github.com/Telosnex/fllama.git
      ref: 3b1351a957920bf2a0df3709cce1e3a7195c479e
  path_provider: ^2.1.6

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
  windows:
    generate: true
  web:
    generate: true
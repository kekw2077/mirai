name: mirai
description: EVS — local & remote AI chat client
publish_to: "none"
version: 1.0.11+12

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  speech_to_text: ^7.0.0
  # Lightweight mic amplitude meter for the desktop sidebar visualizer
  # (PCM stream -> RMS). Falls back gracefully if streaming is unavailable.
  record: ^6.0.0
  # Desktop (Windows) integration: window control + system tray + global
  # hotkey + launch-at-startup. Guarded at runtime to Windows.
  window_manager: ^0.4.2
  tray_manager: ^0.3.0
  hotkey_manager: ^0.2.3
  launch_at_startup: ^0.5.1
  # Win32 system monitor (GlobalMemoryStatusEx / GetSystemTimes) for the
  # CPU/RAM sidebar widget and real RAM detection on Windows.
  ffi: ^2.1.0
  # Per-pixel window transparency on Windows (SetWindowCompositionAttribute) —
  # needed for the floating overlay-widget mode (DesktopIntegration.enterOverlay).
  flutter_acrylic: ^1.1.4
  # Desktop auto-update (Windows = WinSparkle). Replaces Shorebird code-push
  # (mobile-only, Dart-patches-only) — this delivers FULL builds, including
  # native changes (plugins, ffi, the Python sidecar), via an appcast feed.
  auto_updater: ^1.0.0
  # sha256 verification of on-demand downloaded components (sidecar, TTS).
  crypto: ^3.0.0
  uuid: ^4.5.1
  flutter_test:
    sdk: flutter
  file_picker: ^11.0.2
  photo_manager: ^3.9.0
  fllama:
    git:
      url: https://github.com/Telosnex/fllama.git
      ref: 3b1351a957920bf2a0df3709cce1e3a7195c479e
  path_provider: ^2.1.6
  package_info_plus: ^8.1.0
  open_filex: ^4.5.0
  system_info_plus: ^0.0.6

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  assets:
    - assets/icon/app_icon.ico
  uses-material-design: true
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 400
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 500
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 600
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 700
        - asset: assets/fonts/Nunito-VariableFont_wght.ttf
          weight: 800

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  macos:
    generate: true
  windows:
    generate: true
    icon_size: 256
  web:
    generate: true

# Color-only native splash now: the old static orb image was replaced by the
# in-app animated ImmersiveSplash (the sphere "fly-in"). Native splash is just
# a solid brand-background frame shown during native init, matching the app
# background (_bg) so it blends straight into the animated sphere with no
# visible image swap. Colors track _bg: white (light) / #0E0E15 (dark).
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0E0E15"
  # Must stay false: true makes the generator set UIStatusBarHidden=true in
  # ios/Runner/Info.plist, which hides the status bar (time/signal/battery)
  # app-wide on iOS, not just during the splash -- this has bitten the
  # project before. Re-running `flutter_native_splash:create` with this on
  # silently reintroduces the bug, so the flag itself has to stay off.
  fullscreen: false
  android: true
  ios: true
  web: true

  # Android 12+ enforces its own splash (centered launcher icon on a solid
  # color), so it only gets the background color here.
  android_12:
    color: "#FFFFFF"
    color_dark: "#0E0E15"
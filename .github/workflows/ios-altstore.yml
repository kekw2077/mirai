name: iOS AltStore Release

"on":
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: test1
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.2"
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      - name: Read app version
        id: version
        run: |
          FULL=$(grep '^version:' pubspec.yaml | sed 's/version: *//')
          echo "version=${FULL%+*}" >> "$GITHUB_OUTPUT"
          echo "build=${FULL#*+}" >> "$GITHUB_OUTPUT"

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/Runner.app
          zip -r -q Mirai.ipa Payload
          mv Mirai.ipa "$GITHUB_WORKSPACE/Mirai.ipa"

      - name: Create GitHub Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          TAG="ios-v${{ steps.version.outputs.version }}"
          gh release create "$TAG" "Mirai.ipa" \
            --repo "${{ github.repository }}" \
            --title "Mirai iOS $TAG (AltStore, unsigned)" \
            --notes "Несигнированная iOS-сборка для установки через AltStore. AltServer подписывает её локально вашим Apple ID при установке. См. CHANGELOG.md."
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Update AltStore source
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          TAG="${{ steps.release.outputs.tag }}"
          SIZE=$(stat -f%z Mirai.ipa)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          URL="https://github.com/${{ github.repository }}/releases/download/$TAG/Mirai.ipa"
          jq --arg version "$VERSION" \
             --arg build "$BUILD" \
             --arg date "$DATE" \
             --arg url "$URL" \
             --argjson size "$SIZE" \
             '.apps[0].versions = [{
                "version": $version,
                "buildVersion": $build,
                "date": $date,
                "localizedDescription": "См. CHANGELOG.md в репозитории.",
                "downloadURL": $url,
                "size": $size,
                "minOSVersion": "13.0"
              }] + .apps[0].versions' \
             altstore-source.json > altstore-source.json.tmp
          mv altstore-source.json.tmp altstore-source.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add altstore-source.json
          git diff --cached --quiet || git commit -m "Update AltStore source for $TAG"
          git push origin HEAD:main
